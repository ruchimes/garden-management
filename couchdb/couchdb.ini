; Configuración CouchDB para HuertoApp en producción
; Este fichero se monta en /opt/couchdb/etc/local.d/

[couchdb]
single_node=true

[chttpd]
port = 5984
bind_address = 0.0.0.0

; ── CORS ─────────────────────────────────────────────────────────────────────
[cors]
enable_cors = true
origins = https://garden-management-mu.vercel.app
credentials = true
methods = GET, PUT, POST, HEAD, DELETE, OPTIONS
headers = accept, authorization, content-type, origin, referer, x-csrf-token

[httpd]
enable_cors = true

; ── Seguridad ─────────────────────────────────────────────────────────────────
[chttpd_auth]
require_valid_user = false
