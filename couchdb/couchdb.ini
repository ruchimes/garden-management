; Configuración CouchDB para HuertoApp en producción
; Este fichero se monta en /opt/couchdb/etc/local.d/

[couchdb]
single_node=true

[chttpd]
port = 5984
bind_address = 0.0.0.0

; ── CORS ─────────────────────────────────────────────────────────────────────
; Permite peticiones desde el frontend en Vercel.
; En producción, sustituye * por tu dominio de Vercel:
;   https://huerto-app.vercel.app
[cors]
enable_cors = true
origins = *
credentials = true
methods = GET, PUT, POST, HEAD, DELETE, OPTIONS
headers = accept, authorization, content-type, origin, referer, x-csrf-token

[httpd]
enable_cors = true

; ── Seguridad ─────────────────────────────────────────────────────────────────
[chttpd_auth]
require_valid_user = false
