services:
  - type: web
    name: huerto-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: huerto
      - key: API_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
